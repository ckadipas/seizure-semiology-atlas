name: Paper intake

# Manual-only intake. A maintainer triggers this on a submitted issue (its attached
# document(s) OR photographed pages are read on the runner); short, page-cited figures
# are extracted and a pull request is opened for review. Only the derived figures are
# committed — the document/images/full text stay on the runner.
#
# Setup: add a repository secret named INTAKE_TOKEN (Settings -> Secrets and
# variables -> Actions) holding the extraction token.

on:
  # Manual only — nothing runs until a maintainer triggers it with the issue number.
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process (its attached document(s) or photographed pages are read)
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: intake-${{ github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve the target issue
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const num = Number(context.payload.inputs.issue_number);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: num });
            core.setOutput('number', String(num));
            core.setOutput('title', issue.title || '');
            core.setOutput('body', issue.body || '');

      # Extraction step. Restricted to file editing only — no git, no gh — so it
      # never commits or opens anything itself. It just leaves the findings file
      # changed for the next step to publish under a neutral identity.
      - name: Extract page-cited findings from the attached documents
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.INTAKE_TOKEN }}
          claude_args: '--max-turns 60 --allowedTools "Read,Edit,Write,Bash(curl:*),Bash(python3:*)"'
          prompt: |
            You are extracting quantitative figures from one or more papers for a source-grounded, educational epilepsy-semiology atlas.

            Intake issue #${{ steps.ctx.outputs.number }}
            Title: ${{ steps.ctx.outputs.title }}
            Body:
            ${{ steps.ctx.outputs.body }}

            Do this:
            1. Find EVERY attachment in the issue body and collect them ALL. There are two kinds, and a submission may use either or both:
               - PDF documents: links to https://github.com/user-attachments/... ending in .pdf
               - Images (photographed or screenshotted pages of a book/handbook/paper): HTML `<img src="https://github.com/user-attachments/assets/...">` tags and markdown `![...](https://github.com/user-attachments/...)` images.
               Collect every PDF URL and every image URL. If there are none of either, write "NO_DOCUMENT" to /tmp/intake_summary.txt and stop.
            2. Download EACH attachment to a distinct path with `curl -L` and read it in full. Process EVERY attachment, not only the first:
               - PDFs: save as `/tmp/doc1.pdf`, `/tmp/doc2.pdf`, ... and Read each.
               - Images: the asset URL usually has no file extension, so download to a temp path then use python3 to sniff the magic bytes (PNG starts with bytes 89 50 4E 47; JPEG with FF D8 FF) and copy it to `/tmp/img1.png` or `/tmp/img1.jpg`, then Read the image — you can read images directly, so transcribe the localizing/lateralizing text, tables, and figures visible on each page.
               If a download returns a small JSON/HTML error page instead of a real document or image (e.g. a 403), that attachment is not publicly fetchable from the runner; record that in the summary and skip it rather than guessing its contents.
            3. Read enrichment/intake_findings.json (schema: "papers", "new_signs", "findings"), data/semiology_data.json (existing sign names), and enrichment/enrichment.json (the "papers" list, so you don't duplicate a paper).
            4. From EACH paper, extract ONLY short, attributed, PAGE-CITED findings bearing on LOCALIZING or LATERALIZING semiology. For each finding: a one- or two-sentence paraphrase in your own words (never a long verbatim quote) including the reported figure/percentage/N; a "pg" source page (e.g. "p.608"); a "paper" citation; and a "sign_stem" that is a lowercase substring of the sign it attaches to. Add each new paper under "papers" (cite, journal, title, contribution). Follow any specific instruction in the issue body. Never fabricate a figure; omit anything a paper does not support. Prefer disciplined primary series; treat literature-mined meta-analyses skeptically.
            4b. IMPORTANT — a paper may describe a well-evidenced localizing/lateralizing sign that is NOT yet in data/semiology_data.json. Do NOT decline it and do NOT mis-attach it to an unrelated existing sign. Instead ADD it under "new_signs" as a full record: {region, sub, sign, phase, lat, latcode (one of contra/ipsi/dominant/nondominant/right/nonlat/variable), loc, sens, spec, evid (I/II/III), notes, cite, "_ev":[{p,f,pg}]}. Match the region/sub wording used in data/semiology_data.json. Then attach that paper's findings to it via a sign_stem that is a substring of the new sign's name. The maintainer approves by merging the PR — your job is to propose it, not to gatekeep. Only skip a paper if it genuinely has no localizing/lateralizing content (e.g. a pure mortality/outcome study).
            5. Append all findings to enrichment/intake_findings.json (into "findings" and, when applicable, "new_signs"), keeping it valid JSON.
            6. Run and make all pass, fixing your JSON as needed:
               `python3 enrichment/build_enrichment.py && python3 tools/check_provenance.py && python3 tools/validate_data.py && python3 generator/gen_study.py`
            7. IP boundary: do NOT keep any document or full/long text in the repo. The only file you should change is enrichment/intake_findings.json.
            8. Do NOT run git and do NOT open a pull request — leave the file changed for the publishing step.
            9. Write a short summary to /tmp/intake_summary.txt: for each paper processed, its name, how many findings you added, their source pages, and which sign(s) they attach to. If you added nothing usable from a paper, say so and why.

      # Publish step. Rebuilds the branch fresh from main and commits/opens the PR
      # under a neutral CI identity, so nothing carries the extraction step's author.
      - name: Open the pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BR="intake/issue-${{ steps.ctx.outputs.number }}"
          SUM="$(cat /tmp/intake_summary.txt 2>/dev/null || echo '')"
          cp enrichment/intake_findings.json /tmp/intake_findings.json
          # Authenticate git with the job's own token. The extraction step revokes
          # the credential it set up when it finishes, so a plain push has no valid
          # auth; use GITHUB_TOKEN directly and drop any leftover auth header.
          git config --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "atlas-intake"
          git config user.email "atlas-intake@users.noreply.github.com"
          git fetch origin main
          git checkout -B "$BR" origin/main
          cp /tmp/intake_findings.json enrichment/intake_findings.json
          python3 enrichment/build_enrichment.py
          if git diff --quiet -- enrichment/intake_findings.json enrichment/enrichment.json; then
            gh issue comment "${{ steps.ctx.outputs.number }}" --body "Reviewed the submitted document — no changes to publish. ${SUM}"
            exit 0
          fi
          git add enrichment/intake_findings.json enrichment/enrichment.json
          git commit -m "Intake: page-cited findings from issue #${{ steps.ctx.outputs.number }}"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "Intake: findings from issue #${{ steps.ctx.outputs.number }}" \
            --body "Page-cited findings extracted from the submitted document. Only short attributed figures with their source pages were added; the document and full text were not committed. Review each finding against its cited page, then merge. ${SUM} Closes #${{ steps.ctx.outputs.number }}"
          gh issue comment "${{ steps.ctx.outputs.number }}" --body "Opened a pull request with the extracted findings for review. ${SUM}"
