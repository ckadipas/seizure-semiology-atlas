name: Validate PR

# Gates every pull request: the dataset must pass schema/integrity checks, the
# committed enrichment.json must match its source, and the HTML must build.
# This is what keeps a "correctable by anyone" repo from becoming breakable.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate dataset (schema + integrity)
        run: python3 tools/validate_data.py

      - name: Check enrichment.json is in sync with build_enrichment.py
        run: |
          python3 enrichment/build_enrichment.py
          git diff --exit-code enrichment/enrichment.json \
            || (echo "::error::enrichment.json is out of sync. Run 'make build' and commit the result." && exit 1)

      - name: Build must succeed
        run: python3 generator/gen_study.py

      - name: Summarize
        run: echo "✅ Dataset valid, enrichment in sync, HTML builds."
